<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Finanças" />
<title>Finanças</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0d0f;
  --bg2: #16161a;
  --bg3: #1e1e24;
  --bg4: #26262e;
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #55556a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --g1: #c044f0;
  --g2: #5b4cf5;
  --g3: #00d4ff;
  --grad: linear-gradient(135deg, #c044f0, #5b4cf5, #00d4ff);
  --grad2: linear-gradient(135deg, #c044f0 0%, #00d4ff 100%);
  --success: #00d4aa;
  --success-bg: rgba(0,212,170,0.1);
  --danger: #f05080;
  --danger-bg: rgba(240,80,128,0.1);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; color: var(--text); overflow: hidden; }
#app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }

/* GRADIENT TEXT */
.grad-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* SCREENS */
.screen { display: none; flex: 1; overflow-y: auto; padding: 16px 16px 0; }
.screen.active { display: block; }

/* HEADER */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: env(safe-area-inset-top, 14px); }
.page-header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }

/* INCOME BTN */
.income-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border: none; border-radius: 50px; cursor: pointer;
  font-size: 13px; font-weight: 700;
  background: var(--grad);
  color: #fff;
  letter-spacing: 0.02em;
}

/* MONTH NAV */
.month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 22px; }
.month-nav button {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
  color: var(--text2); display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.month-label { font-size: 17px; font-weight: 700; min-width: 150px; text-align: center; letter-spacing: -0.3px; }

/* STAT CARDS */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--grad); opacity: 0.04; pointer-events: none;
}
.stat-card.full { grid-column: 1 / -1; }
.stat-card.full::before { opacity: 0.07; }
.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 600; }
.stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.positive { color: var(--success); }
.negative { color: var(--danger); }

/* SECTION */
.section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 10px; }

/* CARD BREAKDOWN */
.card-breakdown { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 16px;
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius);
}
.card-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; color: var(--text); }
.card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-total { font-size: 14px; font-weight: 700; color: var(--danger); }

/* TX LIST */
.tx-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
.tx-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px;
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); cursor: pointer; transition: background 0.15s;
}
.tx-item:active { background: var(--bg3); }
.tx-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.tx-meta { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg4); color: var(--text2); border: 0.5px solid var(--border2); }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 15px; font-weight: 700; }
.tx-del { font-size: 12px; color: var(--text3); margin-top: 3px; }
.empty-state { text-align: center; padding: 52px 20px; color: var(--text3); font-size: 14px; }
.empty-state i { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.3; }

/* BOTTOM NAV */
.bottom-nav {
  display: flex; justify-content: space-around; align-items: center;
  padding: 12px 0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  border-top: 0.5px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.nav-btn {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 24px; color: var(--text3); font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
}
.nav-btn.active { color: var(--text); }
.nav-btn.active i { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.nav-btn i { font-size: 24px; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(72px + env(safe-area-inset-bottom, 0px));
  right: 20px;
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--grad);
  color: #fff; border: none; cursor: pointer; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(192, 68, 240, 0.4);
  z-index: 100;
}

/* OVERLAY */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.sheet {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  border-top: 0.5px solid var(--border2);
  padding: 22px 18px;
  padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
  width: 100%; max-height: 92vh; overflow-y: auto;
}
.sheet-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.3px; }

/* FORM */
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.form-group input, .form-group select {
  width: 100%; padding: 13px 14px;
  border: 0.5px solid var(--border2); border-radius: var(--radius);
  background: var(--bg3); color: var(--text); font-size: 16px; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--g1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* TYPE TOGGLE */
.type-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 0.5px solid var(--border2); border-radius: var(--radius); overflow: hidden; margin-bottom: 18px; }
.type-btn { padding: 13px; text-align: center; cursor: pointer; font-size: 15px; font-weight: 700; border: none; background: var(--bg3); color: var(--text3); transition: all 0.2s; }
.type-btn.active { background: var(--grad); color: #fff; }

/* BUTTONS */
.btn-primary {
  width: 100%; padding: 16px;
  background: var(--grad);
  color: #fff; border: none; border-radius: var(--radius-lg);
  font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 12px;
  letter-spacing: 0.02em;
}
.btn-cancel {
  width: 100%; padding: 14px; background: none;
  color: var(--text2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg); font-size: 15px; cursor: pointer; margin-top: 8px; font-weight: 600;
}

/* GRAD BORDER BUTTON (outline style) */
.btn-outline {
  background: none; border: none; border-radius: var(--radius); cursor: pointer;
  padding: 9px 14px; font-size: 14px; font-weight: 700; color: var(--text);
  position: relative; display: flex; align-items: center; gap: 6px;
}
.btn-outline::before {
  content: ''; position: absolute; inset: 0;
  border-radius: var(--radius); padding: 1px;
  background: var(--grad);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}

/* CARDS SCREEN */
.card-item {
  display: flex; align-items: center; gap: 12px; padding: 15px;
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 10px;
}
.card-item-info { flex: 1; font-size: 15px; font-weight: 600; }
.del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 20px; padding: 4px; opacity: 0.7; }

/* SIDE MENU */
.menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:none; backdrop-filter:blur(4px); }
.menu-overlay.open { display:block; }
.side-menu {
  position:fixed; top:0; left:0; bottom:0; width:78%; max-width:300px;
  background:var(--bg2); z-index:301; transform:translateX(-100%);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
  padding-top: env(safe-area-inset-top, 20px);
}
.side-menu.open { transform:translateX(0); }
.menu-header { padding:24px 20px 16px; border-bottom:0.5px solid var(--border); }
.menu-header h2 { font-size:22px; font-weight:800; letter-spacing:-0.3px; }
.menu-header p { font-size:13px; color:var(--text2); margin-top:3px; }
.menu-items { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px; }
.menu-item {
  display:flex; align-items:center; gap:14px;
  padding:14px 12px; border-radius:var(--radius);
  cursor:pointer; background:none; border:none; color:var(--text);
  font-size:15px; font-weight:600; width:100%; text-align:left;
  transition:background 0.15s;
}
.menu-item:active { background:var(--bg3); }
.menu-item i { font-size:22px; color:var(--text2); }
.menu-item .menu-item-desc { font-size:12px; color:var(--text2); font-weight:400; margin-top:1px; }
.menu-section-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.07em; padding:12px 12px 6px; }
.menu-footer { padding:16px 20px; padding-bottom:calc(16px + env(safe-area-inset-bottom,0px)); border-top:0.5px solid var(--border); }
.menu-footer p { font-size:12px; color:var(--text3); text-align:center; }
.hamburger-btn { background:none; border:none; cursor:pointer; color:var(--text2); padding:4px; font-size:26px; display:flex; align-items:center; }
</style>
</head>
<body>
<div id="app">
  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" onclick="openMenu()"><i class="ti ti-menu-2"></i></button>
        <h1><span class="grad-text">Finanças</span></h1>
      </div>
      <button class="income-btn" onclick="openIncome()">
        <i class="ti ti-plus" style="font-size:15px"></i> Entrada
      </button>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="summary-grid">
      <div class="stat-card"><div class="stat-label">Entradas</div><div class="stat-value positive" id="total-income">R$ 0,00</div></div>
      <div class="stat-card"><div class="stat-label">Saídas</div><div class="stat-value negative" id="total-expenses">R$ 0,00</div></div>
      <div class="stat-card full"><div class="stat-label">Saldo do mês</div><div class="stat-value" id="saldo-mes">R$ 0,00</div></div>
    </div>
    <div class="section-title">Por cartão</div>
    <div class="card-breakdown" id="card-breakdown"></div>
    <div class="section-title">Lançamentos</div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- CARDS -->
  <div id="screen-cards" class="screen">
    <div class="page-header">
      <h1><span class="grad-text">Cartões</span></h1>
      <button class="btn-outline" onclick="openCardForm()"><i class="ti ti-plus" style="font-size:16px"></i>Novo</button>
    </div>
    <div id="cards-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goHome()"><i class="ti ti-home"></i>Início</button>
    <button class="nav-btn" id="nav-cards" onclick="goCards()"><i class="ti ti-credit-card"></i>Cartões</button>
  </nav>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openExpense()" aria-label="Novo lançamento">
  <i class="ti ti-plus"></i>
</button>

<!-- TX FORM -->
<div class="overlay" id="tx-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="tx-form-title">Novo Lançamento</div>
    <div class="type-toggle">
      <button class="type-btn active" id="btn-exp" onclick="setType('expense')">Saída</button>
      <button class="type-btn" id="btn-inc" onclick="setType('income')">Entrada</button>
    </div>
    <div class="form-group"><label>Estabelecimento / Descrição</label><input id="f-name" placeholder="Ex: iFood, Academia, Salário..." /></div>
    <div class="form-group"><label>Valor (R$)</label><input id="f-value" type="number" inputmode="decimal" step="0.01" placeholder="0,00" /></div>
    <div id="expense-fields">
      <div class="form-group"><label>Cartão / Método</label><select id="f-card"></select></div>
      <div class="type-toggle" style="margin-bottom:14px">
        <button class="type-btn active" id="btn-parcelado" onclick="setParcelType('parcelado')">Parcelado</button>
        <button class="type-btn" id="btn-fixo" onclick="setParcelType('fixo')">Fixo 🔁</button>
      </div>
      <div id="parcel-fields" class="form-row">
        <div class="form-group"><label>Parcela atual</label><input id="f-parc-atual" type="number" inputmode="numeric" min="1" value="1" /></div>
        <div class="form-group"><label>Total parcelas</label><input id="f-parc-final" type="number" inputmode="numeric" min="1" value="1" /></div>
      </div>
      <div id="fixo-info" style="display:none;font-size:13px;color:var(--text2);background:var(--bg3);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px">
        🔁 Este gasto vai aparecer automaticamente em todos os meses até você excluí-lo.
      </div>
    </div>
    <div class="form-group"><label>Mês</label><input id="f-month" type="month" /></div>
    <button class="btn-primary" onclick="saveTx()">Salvar</button>
    <button class="btn-cancel" onclick="closeTxForm()">Cancelar</button>
  </div>
</div>

<!-- CARD FORM -->
<div class="overlay" id="card-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Novo Cartão</div>
    <div class="form-group"><label>Nome</label><input id="cf-name" placeholder="Ex: Nubank (Júlia)" /></div>
    <div class="form-group"><label>Cor</label>
      <select id="cf-color">
        <option value="#c044f0">Roxo</option>
        <option value="#00d4ff">Ciano</option>
        <option value="#5b4cf5">Azul</option>
        <option value="#f05080">Rosa</option>
        <option value="#00d4aa">Verde</option>
        <option value="#f5a623">Laranja</option>
        <option value="#888780">Cinza</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveCard()">Salvar Cartão</button>
    <button class="btn-cancel" onclick="closeCardForm()">Cancelar</button>
  </div>
</div>

<!-- SIDE MENU OVERLAY -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="side-menu" id="side-menu">
  <div class="menu-header">
    <h2><span class="grad-text">Menu</span></h2>
    <p>henryqueads-ctrl</p>
  </div>
  <div class="menu-items">
    <div class="menu-section-title">Dados</div>
    <button class="menu-item" onclick="exportBackup()">
      <i class="ti ti-download"></i>
      <div><div>Exportar backup</div><div class="menu-item-desc">Salvar seus dados no iCloud</div></div>
    </button>
    <button class="menu-item" onclick="document.getElementById('import-input').click()">
      <i class="ti ti-upload"></i>
      <div><div>Importar backup</div><div class="menu-item-desc">Restaurar dados salvos</div></div>
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBackup(event)" />
    <div class="menu-section-title" style="margin-top:8px">Perigo</div>
    <button class="menu-item" onclick="clearAllData()" style="color:var(--danger)">
      <i class="ti ti-trash" style="color:var(--danger)"></i>
      <div><div>Apagar tudo</div><div class="menu-item-desc" style="color:var(--danger);opacity:0.7">Remove todos os lançamentos</div></div>
    </button>
  </div>
  <div class="menu-footer"><p>Finanças App • Seus dados ficam no seu dispositivo</p></div>
</div>

<script>
function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('side-menu').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  document.getElementById('side-menu').classList.remove('open');
}
function exportBackup() {
  const data = { txs: loadTx(), cards: loadCards(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'financas-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  closeMenu();
}
function importBackup(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.txs || !data.cards) { alert('Arquivo inválido!'); return; }
      if(!confirm('Isso vai substituir todos os dados atuais. Continuar?')) return;
      saveTxData(data.txs);
      saveCardsData(data.cards);
      closeMenu();
      render();
      alert('Backup restaurado com sucesso!');
    } catch { alert('Erro ao ler o arquivo.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function clearAllData() {
  if(!confirm('Apagar TODOS os lançamentos? Isso não pode ser desfeito!')) return;
  if(!confirm('Tem certeza mesmo? Todos os dados serão perdidos.')) return;
  saveTxData([]);
  closeMenu();
  render();
}
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let currentMonth = new Date().toISOString().slice(0,7);
let currentType = 'expense';

function fmt(v) {
  return 'R$ ' + Math.abs(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function monthLabel(k) {
  const [y,m] = k.split('-');
  return MONTHS[parseInt(m)-1] + ' ' + y;
}
function loadTx() { try { return JSON.parse(localStorage.getItem('fin_tx')||'[]'); } catch { return []; } }
function saveTxData(d) { localStorage.setItem('fin_tx', JSON.stringify(d)); }
function loadCards() {
  try { const c = JSON.parse(localStorage.getItem('fin_cards')); return c&&c.length?c:defaultCards(); }
  catch { return defaultCards(); }
}
function saveCardsData(d) { localStorage.setItem('fin_cards', JSON.stringify(d)); }
function defaultCards() {
  return [
    { id:'nubank-julia', name:'Nubank (Júlia)', color:'#c044f0' },
    { id:'inter-julia', name:'Inter (Júlia)', color:'#f05080' },
    { id:'cartao-pai', name:'Cartão (Pai)', color:'#00d4aa' },
    { id:'dinheiro', name:'Dinheiro / Pix', color:'#888780' }
  ];
}
function changeMonth(d) {
  const [y,m] = currentMonth.split('-').map(Number);
  const nd = new Date(y, m-1+d, 1);
  currentMonth = nd.toISOString().slice(0,7);
  render();
}
function render() {
  const txs = loadTx(); const cards = loadCards();
  document.getElementById('month-label').textContent = monthLabel(currentMonth);
  const fixoTxs = txs.filter(t=>t.fixo && t.type==='expense');
  const monthTxs = txs.filter(t=>t.month===currentMonth && !t.fixo);
  const fixoThisMonth = fixoTxs.filter(t => t.month <= currentMonth);
  const month = [...monthTxs, ...fixoThisMonth];
  const income = month.filter(t=>t.type==='income').reduce((a,b)=>a+b.value,0);
  const expenses = month.filter(t=>t.type==='expense').reduce((a,b)=>a+b.value,0);
  const saldo = income - expenses;
  document.getElementById('total-income').textContent = fmt(income);
  document.getElementById('total-expenses').textContent = fmt(expenses);
  const sel = document.getElementById('saldo-mes');
  sel.textContent = (saldo<0?'-':'')+fmt(saldo);
  sel.className = 'stat-value '+(saldo>=0?'positive':'negative');
  const cardExp = {};
  month.filter(t=>t.type==='expense').forEach(t=>{ cardExp[t.card]=(cardExp[t.card]||0)+t.value; });
  const bd = document.getElementById('card-breakdown');
  const used = cards.filter(c=>cardExp[c.id]>0);
  bd.innerHTML = used.length ? used.map(c=>`<div class="card-row"><span class="card-name"><span class="card-dot" style="background:${c.color}"></span>${c.name}</span><span class="card-total">${fmt(cardExp[c.id])}</span></div>`).join('') : '<div style="font-size:13px;color:var(--text3);padding:6px 0">Nenhum gasto registrado ainda.</div>';
  const sorted = [...month].sort((a,b)=>b.id-a.id);
  const tl = document.getElementById('tx-list');
  if(!sorted.length) {
    tl.innerHTML = '<div class="empty-state"><i class="ti ti-receipt"></i>Nenhum lançamento nesse mês</div>';
  } else {
    tl.innerHTML = sorted.map(t=>{
      const card = cards.find(c=>c.id===t.card);
      const isInc = t.type==='income';
      const parc = t.fixo?`<span class="tag">🔁 Fixo</span>`:(!isInc&&t.parcFinal>1)?`<span class="tag">${t.parcAtual}/${t.parcFinal}</span>`:'';
      const cardName = card&&!isInc?`<span>${card.name}</span>`:'';
      const iconBg = isInc?'rgba(0,212,170,0.12)':'rgba(240,80,128,0.1)';
      const iconColor = isInc?'var(--success)':'var(--danger)';
      return `<div class="tx-item" onclick="deleteTx(${t.id})">
        <div class="tx-icon" style="background:${iconBg}">
          <i class="ti ${isInc?'ti-trending-up':'ti-shopping-cart'}" style="color:${iconColor}"></i>
        </div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-meta">${cardName}${parc}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount" style="color:${isInc?'var(--success)':'var(--danger)'}">${isInc?'+':'-'}${fmt(t.value)}</div>
          <div class="tx-del"><i class="ti ti-trash" style="font-size:13px"></i></div>
        </div>
      </div>`;
    }).join('');
  }
  const cl = document.getElementById('cards-list');
  cl.innerHTML = loadCards().map(c=>`<div class="card-item"><span class="card-dot" style="background:${c.color};width:12px;height:12px;flex-shrink:0"></span><span class="card-item-info">${c.name}</span><button class="del-btn" onclick="deleteCard('${c.id}')"><i class="ti ti-trash"></i></button></div>`).join('');
}
function setType(t) {
  currentType = t;
  document.getElementById('btn-exp').className = 'type-btn'+(t==='expense'?' active':'');
  document.getElementById('btn-inc').className = 'type-btn'+(t==='income'?' active':'');
  document.getElementById('expense-fields').style.display = t==='expense'?'block':'none';
}
function setParcelType(t) {
  document.getElementById('btn-parcelado').className = 'type-btn'+(t==='parcelado'?' active':'');
  document.getElementById('btn-fixo').className = 'type-btn'+(t==='fixo'?' active':'');
  document.getElementById('parcel-fields').style.display = t==='parcelado'?'grid':'none';
  document.getElementById('fixo-info').style.display = t==='fixo'?'block':'none';
}
function openExpense() {
  setType('expense');
  setParcelType('parcelado');
  document.getElementById('f-name').value='';
  document.getElementById('f-value').value='';
  document.getElementById('f-parc-atual').value='1';
  document.getElementById('f-parc-final').value='1';
  document.getElementById('f-month').value=currentMonth;
  const cards = loadCards();
  document.getElementById('f-card').innerHTML = cards.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('tx-overlay').classList.add('open');
}
function openIncome() { openExpense(); setType('income'); }
function closeTxForm() { document.getElementById('tx-overlay').classList.remove('open'); }
function saveTx() {
  const name = document.getElementById('f-name').value.trim();
  const value = parseFloat(document.getElementById('f-value').value);
  const month = document.getElementById('f-month').value;
  if(!name||!value||!month) { alert('Preencha todos os campos!'); return; }
  const txs = loadTx();
  const isFixo = currentType==='expense' && document.getElementById('btn-fixo').classList.contains('active');
  const card = currentType==='expense'?document.getElementById('f-card').value:null;
  const parcFinal = (!isFixo&&currentType==='expense')?parseInt(document.getElementById('f-parc-final').value)||1:1;
  const groupId = Date.now();

  if(currentType==='expense' && !isFixo && parcFinal > 1) {
    const [y,m] = month.split('-').map(Number);
    for(let i=0;i<parcFinal;i++){
      const d = new Date(y, m-1+i, 1);
      const parcelMonth = d.toISOString().slice(0,7);
      txs.push({ id: groupId+i, groupId, type:'expense', name, value, month: parcelMonth,
        card, fixo:false, parcAtual: i+1, parcFinal });
    }
  } else {
    txs.push({ id: groupId, type:currentType, name, value, month,
      card, fixo: isFixo, parcAtual:1, parcFinal:1 });
  }
  saveTxData(txs); closeTxForm(); render();
}
function deleteTx(id) {
  const txs = loadTx();
  const tx = txs.find(t=>t.id===id);
  if(!tx) return;
  if(tx.groupId && tx.parcFinal > 1) {
    const opts = confirm('Excluir TODAS as parcelas desta compra?\n\nOK = todas as parcelas\nCancelar = só esta parcela');
    if(opts) { saveTxData(txs.filter(t=>t.groupId!==tx.groupId)); }
    else { saveTxData(txs.filter(t=>t.id!==id)); }
  } else if(tx.fixo) {
    if(!confirm('Excluir este gasto fixo? Ele vai sumir de todos os meses.')) return;
    saveTxData(txs.filter(t=>t.id!==id));
  } else {
    if(!confirm('Excluir este lançamento?')) return;
    saveTxData(txs.filter(t=>t.id!==id));
  }
  render();
}
function openCardForm() { document.getElementById('cf-name').value=''; document.getElementById('card-overlay').classList.add('open'); }
function closeCardForm() { document.getElementById('card-overlay').classList.remove('open'); }
function saveCard() {
  const name = document.getElementById('cf-name').value.trim();
  if(!name) return;
  const cards = loadCards();
  cards.push({ id:'card-'+Date.now(), name, color:document.getElementById('cf-color').value });
  saveCardsData(cards); closeCardForm(); render();
}
function deleteCard(id) {
  if(!confirm('Excluir este cartão?')) return;
  saveCardsData(loadCards().filter(c=>c.id!==id)); render();
}
function goHome() {
  document.getElementById('screen-home').classList.add('active');
  document.getElementById('screen-cards').classList.remove('active');
  document.getElementById('nav-home').classList.add('active');
  document.getElementById('nav-cards').classList.remove('active');
  document.getElementById('fab').style.display='flex';
}
function goCards() {
  document.getElementById('screen-cards').classList.add('active');
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('nav-cards').classList.add('active');
  document.getElementById('nav-home').classList.remove('active');
  document.getElementById('fab').style.display='none';
}
render();
</script>
</body>
</html>
